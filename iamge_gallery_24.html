<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        /* Buttons */
        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        /* Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .gallery img {
            width: 150px;
            height: 150px;
            margin: 10px;
            transition: 0.3s;
        }

        /* Hover effect */
        .gallery img:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<h2>Image Gallery</h2>

<!-- Buttons -->
<button onclick="filter('all')">All</button>
<button onclick="filter('nature')">Nature</button>
<button onclick="filter('city')">City</button>

<!-- Images -->
<div class="gallery">

    <img src="https://via.placeholder.com/150" class="nature">
    <img src="https://via.placeholder.com/150" class="city">
    <img src="https://via.placeholder.com/150" class="nature">
    <img src="https://via.placeholder.com/150" class="city">
    <img src="https://via.placeholder.com/150" class="nature">
    <img src="https://via.placeholder.com/150" class="city">

</div>

<script>

function filter(category) {
    let images = document.querySelectorAll(".gallery img");

    images.forEach(function(img) {

        if (category === "all" || img.classList.contains(category)) {
            img.style.display = "block";
        } else {
            img.style.display = "none";
        }

    });
}

</script>

</body>
</html>
