<!DOCTYPE html>
<html>
<head>
  <style>
    body { text-align: center; font-family: sans-serif; padding: 40px; }
    button { padding: 10px 20px; cursor: pointer; font-size: 16px; }

    .dark {
      background: #222;
      color: white;
    }
  </style>
</head>
<body id="page">

  <h2 id="title">Theme Switcher</h2>
  <p>This is a sample paragraph.</p>
  <button onclick="toggle()">Toggle Dark/Light</button>

  <script>
    function toggle() {
      page.classList.toggle('dark');
      if (page.classList.contains('dark')) {
        localStorage.setItem('theme', 'dark');
      } else {
        localStorage.setItem('theme', 'light');
      }
    }

    // Remember theme on page load
    if (localStorage.getItem('theme') == 'dark') {
      page.classList.add('dark');
    }
  </script>

</body>
</html>
