<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                text-align: center;
                font-family: sans-serif;
                padding: 40px;
            }
            canvas{
                max-width: 500px;
                margin: auto;
            }
        </style>
    </head>
    <body>
        <h2> Students Per Department</h2>
        <canvas id="chart"></canvas>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            new Chart(chart,{
                type:'bar',
                data:{
                    lables:['cs','it','mech','civil'],
                    datasets:[{
                        label: 'studnets',
                        data:[120,80,60,60],
                        backgroundColor:['red','blue','green','orange','purple']
                    }]
                }
            });
        </script>
    </body>
</html>
