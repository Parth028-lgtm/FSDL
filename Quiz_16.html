<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                text-align:center;

    <body>
        <h2>QUIZ</h2>

        <input type="radio" name="q3" value="2">Logic
        <br><br>

        <button onclick="submit()">submmit </button>
        <h3 id="result"></h3>

        <script>
            let ansers={q1:"1",q2:"2",q3:"3"};
            function submit(){
                let score=0;
                let a1 = document.querySelector('input[name="q1"]:Checked');
                let a2 = document.querySelector('input[name="q2"]:Checked');
                let a3 = document.querySelector('input[name="q3"]:Checked');

                if(a1 && a1.value == answers.q1) score++;
                if(a2 && a2.value == answers.q2) score++;
                if(a3 && a3.value == answers.q3) score++;

                result.innerHTML = "score:" + score+"/3";
            }
        </script>
