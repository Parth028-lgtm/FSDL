<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                font-family: sans-serif;
                display: flex;
                padding: 40px;
                gap: 40px;
            }
            input{
                padding:20px;
                margin:5px 0;
                display: block;
                width:200px;
            }
            .card{
                border: 1px solid #ccc;
                border-radius: 10px;
                padding: 20px;
                width:200px;
            }
        </style>
    </head>
    <body>
        <div>
            <h2>Enter Details</h2>
            <input id="name" placeholder="Name" oninput = "update()">
            <input id="email" placeholder="Email" oninput = "update()">
            <input id="phone" placeholder="Phone" oninput = "update()">
        </div>
        <div class="card">
            <h2 id = "pname">Name</h2>
            <p id = "pemail">Email</p>  
            <p id = "pphone">Phone</p>
        </div>
        <script>
            function update(){
                pname.innerHTML= name.value;
                pemailHTML = email.value;
                pphone.innerHTML = phone.value;
            }
        </script>
    </body>
</html>
