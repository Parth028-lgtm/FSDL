<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 500px; margin: auto; }

    .skill { margin: 15px 0; }

    .bar-bg {
      background: #eee;
      border-radius: 10px;
      height: 20px;
    }

    .bar {
      background: green;
      height: 20px;
      border-radius: 10px;
    }

    label { font-weight: bold; }
  </style>
</head>
<body>

  <h2>My Skills</h2>

  <div class="skill">
    <label>HTML — 90%</label>
    <div class="bar-bg">
      <div class="bar" style="width: 90%"></div>
    </div>
  </div>

  <div class="skill">
    <label>CSS — 75%</label>
    <div class="bar-bg">
      <div class="bar" style="width: 75%"></div>
    </div>
  </div>

  <div class="skill">
    <label>JavaScript — 60%</label>
    <div class="bar-bg">
      <div class="bar" style="width: 60%"></div>
    </div>
  </div>

  <div class="skill">
    <label>MongoDB — 50%</label>
    <div class="bar-bg">
      <div class="bar" style="width: 50%"></div>
    </div>
  </div>

</body>
</html>
