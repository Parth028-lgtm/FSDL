<!DOCTYPE html>
<html>
    <head>
        <Style>
            body{
                font-family: sans-serif;
                padding: 20px;
            }
            h2{
                text-align: center;
                color: darkblue;
            }
            table{
                border-collapse: collapse;
                width: 100%;
                text-align: center;
            }
            th,td{
                border: 1px solid black;
                padding: 10px;
            }
            th{
                background: yellow;
                color: yellow;
            }
            tr:nth-child(even){
                background: #eee;
            }
        </Style>
    </head>
    <body>
        <h2>Weekly class timetable</h2>
        <table>
            <tr>
                <th>Time</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
            <tr>
                <td>9:00-10:00</td>
                <td>Maths</td>
                <td>English</td>
              <td rowspan="2">Physics   </td>
                <td>Computer</td>
                <td>History</td>
            </tr>
            <tr>
                <td>11:00 AM</td>
                <!-- colspan=5 means this cell will take 5 columns -->
                <td colspan="5">Lunch Break</td>
            </tr>
        </table>
    </body>
</html>
